# Thresholds for weekly health digest analysis
# These are population-level evidence-based defaults. Personal baselines
# are computed weekly from the data itself; only these invariants are pinned.

training:
  acwr_lower_bound: 0.8       # Acute:Chronic Workload Ratio safe zone
  acwr_upper_bound: 1.3
  weekly_acute_ramp_cap: 1.10 # Next week acute <= current × 1.10
  deload_multiplier: 0.70     # When red flags trigger
  return_from_layoff_acute_to_chronic_threshold: 0.50

deviation_thresholds:
  personal_sigma_dive: 1.5    # σ from 90-day baseline that forces deep-dive
  hrv_below_baseline_days: 3  # Consecutive days below hrv_baseline_low
  sleep_low_nights_per_week: 4 # Nights <6h that force deep-dive
  sleep_score_drop_pct: 0.25
  sleep_score_drop_consecutive: 2
  skin_temp_spike_celsius: 0.5
  skin_temp_spike_consecutive: 2
  weight_trend_reversal_window_days: 28

data_quality:
  abort_if_no_data_days: 5    # No core-table data in last N days => pipeline warning
  weight_kg_floor: 70         # Filter non-user readings on withings

session_planning:
  min_sessions_per_week: 3
  max_sessions_per_week: 5
  horizon_days: 7

evidence_classes:
  - RCT
  - guideline
  - consensus
  - preliminary
