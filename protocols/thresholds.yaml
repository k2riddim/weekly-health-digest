# Thresholds for weekly health digest analysis
# These are population-level evidence-based defaults. Personal baselines
# are computed weekly from the data itself; only these invariants are pinned.

training:
  acwr_lower_bound: 0.8       # Acute:Chronic Workload Ratio safe zone
  acwr_upper_bound: 1.3
  weekly_acute_ramp_cap: 1.10 # Next week acute <= current × 1.10 (general routine)
  deload_multiplier: 0.70     # When red flags trigger
  return_from_layoff_acute_to_chronic_threshold: 0.50
  # Return-to-running override (see protocols/return-to-running.md). During an
  # active comeback the chronic-load denominator is artificially depressed by the
  # layoff, so the general ACWR band and ramp cap are too conservative — they make
  # longer single runs and normal weekly progression impossible. These looser
  # values apply ONLY while the return-to-running protocol is active.
  comeback_weekly_acute_ramp_cap: 1.15  # Next week acute <= current × 1.15
  comeback_acwr_upper_bound: 1.50        # Tolerated while chronic base is rebuilding

deviation_thresholds:
  personal_sigma_dive: 1.5    # σ from 90-day baseline that forces deep-dive
  hrv_below_baseline_days: 3  # Consecutive days below hrv_baseline_low
  sleep_low_nights_per_week: 4 # Nights <6h that force deep-dive
  sleep_score_drop_pct: 0.25
  sleep_score_drop_consecutive: 2
  skin_temp_spike_celsius: 0.5
  skin_temp_spike_consecutive: 2
  weight_trend_reversal_window_days: 28

data_quality:
  abort_if_no_data_days: 5    # No core-table data in last N days => pipeline warning
  weight_kg_floor: 70         # Filter non-user readings on withings

# Heat protocol (see protocols/heat.md). Bands apply to the FEELS-LIKE
# (apparent) temperature at the session's actual start hour, after the
# post-heatwave modifier. Personalized conservatively for a ~103 kg,
# deconditioned, poorly-acclimatized athlete — deliberately cooler than
# generic population thresholds. Timing (run at the coolest hour) is the
# first mitigation, before any duration cut.
heat:
  green_max: 21               # <= => normal training
  yellow_max: 26              # caution: coolest window, Z1-Z2, ease pace, hydrate
  orange_max: 30              # high: easy only + ~30-40% shorter, or substitute indoor
  # > orange_max => RED: no outdoor running; indoor/AC or rest
  post_heatwave_window_days: 10     # modifier active for N days after a heatwave
  post_heatwave_shift_celsius: 3    # lower every band boundary by this while active
  heatwave_defining_feels_like: 32  # >=3 consecutive days at/above this = a heatwave
  duration_cut_orange_pct: 0.35     # duration reduction in the Orange band

session_planning:
  min_sessions_per_week: 3
  max_sessions_per_week: 5
  horizon_days: 7

evidence_classes:
  - RCT
  - guideline
  - consensus
  - preliminary
